services:
  postgres:
    image: postgres:16-alpine
    container_name: busexpress_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: busexpress
      POSTGRES_USER: busexpress
      POSTGRES_PASSWORD: busexpress_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busexpress"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: busexpress_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: busexpress_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: busexpress
      RABBITMQ_DEFAULT_PASS: busexpress_secret
      RABBITMQ_DEFAULT_VHOST: busexpress
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busexpress_api
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_SECRET: busexpress_super_secret_key_change_in_prod
      DATABASE_URL: postgresql://busexpress:busexpress_secret@postgres:5432/busexpress?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: amqp://busexpress:busexpress_secret@rabbitmq:5672/busexpress/messages
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: busexpress_jwt
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
    volumes:
      - ./backend:/var/www/html          # code source
      - vendor_data:/var/www/html/vendor # vendor séparé pour ne pas être écrasé
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  messenger:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busexpress_messenger
    restart: unless-stopped
    command: sh -c "cd /var/www/html && [ ! -f vendor/autoload.php ] && composer install --no-interaction --prefer-dist --no-security-blocking; php bin/console messenger:consume async --limit=0 --memory-limit=128M -vv"
    environment:
      APP_ENV: dev
      APP_SECRET: busexpress_super_secret_key_change_in_prod
      DATABASE_URL: postgresql://busexpress:busexpress_secret@postgres:5432/busexpress?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: amqp://busexpress:busexpress_secret@rabbitmq:5672/busexpress/messages
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: busexpress_jwt
    volumes:
      - ./backend:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      - api
      - rabbitmq
      - redis

  websocket:
    build:
      context: ./websocket
      dockerfile: Dockerfile
    container_name: busexpress_ws
    restart: unless-stopped
    environment:
      WS_PORT: 4000
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: busexpress_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://api:8000
      VITE_WS_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api
      - websocket
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  vendor_data:
  frontend_node_modules:
