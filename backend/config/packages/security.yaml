security:
    password_hashers:
        App\Entity\Agency:
            algorithm: auto
        App\Entity\User:
            algorithm: auto

    providers:
        agency_provider:
            entity:
                class: App\Entity\Agency
                property: email
        user_provider:
            entity:
                class: App\Entity\User
                property: email
        chain_provider:
            chain:
                providers: [agency_provider, user_provider]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Login agence
        login_agency:
            pattern: ^/api/auth/login$
            stateless: true
            provider: agency_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Login user (voyageur)
        login_user:
            pattern: ^/api/auth/login-user$
            stateless: true
            provider: user_provider
            json_login:
                check_path: /api/auth/login-user
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: chain_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth,              roles: PUBLIC_ACCESS }
        - { path: ^/api/agencies,          roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/trips,             roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/bookings,          roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/bookings,          roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/admin,             roles: ROLE_ADMIN }
        - { path: ^/api/user,              roles: ROLE_USER }
        - { path: ^/api,                   roles: IS_AUTHENTICATED_FULLY }
