name: BusExpress CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Backend Symfony ──────────────────────────────────────────────────────
  backend:
    name: "Backend — PHP 8.3"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: busexpress_test
          POSTGRES_USER: busexpress
          POSTGRES_PASSWORD: busexpress_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U busexpress"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, intl, zip, bcmath, redis
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-security-blocking

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem -passout pass:busexpress_jwt 2048 2>/dev/null
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:busexpress_jwt 2>/dev/null

      - name: Lint YAML config files
        run: php bin/console lint:yaml config --parse-tags
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://busexpress:busexpress_secret@localhost:5432/busexpress_test?serverVersion=16
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: busexpress_jwt
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Lint container (DI)
        run: php bin/console lint:container
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://busexpress:busexpress_secret@localhost:5432/busexpress_test?serverVersion=16
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: busexpress_jwt
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://busexpress:busexpress_secret@localhost:5432/busexpress_test?serverVersion=16
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: busexpress_jwt
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Validate Doctrine schema
        run: php bin/console doctrine:schema:validate --skip-sync
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://busexpress:busexpress_secret@localhost:5432/busexpress_test?serverVersion=16
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: busexpress_jwt
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://busexpress:busexpress_secret@localhost:5432/busexpress_test?serverVersion=16
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: busexpress_jwt
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ── 2. Frontend React ───────────────────────────────────────────────────────
  frontend:
    name: "Frontend — Node 20"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: http://localhost:4000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 3. WebSocket Server ─────────────────────────────────────────────────────
  websocket:
    name: "WebSocket — Node 20"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: websocket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: websocket/package-lock.json

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Syntax check
        run: node --check server.js

  # ── 4. Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: "Docker — Build images"
    runs-on: ubuntu-latest
    needs: [backend, frontend, websocket]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: busexpress-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: busexpress-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build WebSocket image
        uses: docker/build-push-action@v5
        with:
          context: ./websocket
          push: false
          tags: busexpress-websocket:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Integration ──────────────────────────────────────────────────────────
  integration:
    name: "Integration — docker compose"
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for API
        run: |
          echo "⏳ Attente de l'API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/agencies > /dev/null 2>&1; then
              echo "✅ API prête"
              exit 0
            fi
            echo "  tentative $i/30..."
            sleep 5
          done
          echo "❌ API pas disponible"
          docker compose logs api
          exit 1

      - name: Test API endpoints
        run: |
          echo "🧪 GET /api/agencies"
          curl -sf http://localhost:8000/api/agencies | python3 -m json.tool | head -10

          echo "🧪 GET /api/trips"
          curl -sf http://localhost:8000/api/trips | python3 -m json.tool | head -10

          echo "🧪 POST /api/auth/login"
          TOKEN=$(curl -sf -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"contact@transexpress.fr","password":"password123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "✅ Token JWT : ${TOKEN:0:40}..."

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API ===" && docker compose logs api --tail=50
          echo "=== Messenger ===" && docker compose logs messenger --tail=30

      - name: Teardown
        if: always()
        run: docker compose down -v
